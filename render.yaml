services:
  - type: web
    name: campusconnect
    env: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: Dockerfile
    autoDeploy: true
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "yourdomain.onrender.com"
      - key: DJANGO_USE_WHITENOISE
        value: "True"
      - key: DB_ENGINE
        value: "postgresql"
      - key: DATABASE_URL
        fromDatabase:
          name: campusconnect_db
          property: connectionString

  - type: pserv
    name: campusconnect_db
    plan: free
    ipAllowList: []
    postgresVersion: 15
