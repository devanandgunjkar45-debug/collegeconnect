{% extends 'core/base.html' %}
{% block title %}Password reset sent{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm p-4">
                <h2 class="mb-3">Check your email</h2>
                <p class="text-muted">We have sent a password reset link to your email address. Follow the instructions in the message to reset your password.</p>
                <a href="{% url 'core:login' %}" class="btn btn-outline-primary">Back to login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
